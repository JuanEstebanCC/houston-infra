# Houston Engine — local deployment via docker compose.
# Copy `.env.example` to `.env` and fill in HOUSTON_ENGINE_TOKEN.

services:
  engine:
    build:
      context: ..
      dockerfile: always-on/Dockerfile
    image: houston/engine:local
    restart: unless-stopped
    ports:
      - "7777:7777"
    environment:
      HOUSTON_BIND: "0.0.0.0:7777"
      HOUSTON_BIND_ALL: "1"
      HOUSTON_ENGINE_TOKEN: "${HOUSTON_ENGINE_TOKEN}"
      HOUSTON_NO_PARENT_WATCHDOG: "1"
    # SEGURIDAD TRACK A: Aplicando Aislamiento Local para la Demo
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - houston-home:/data/.houston
      - houston-docs:/data/Houston
      # Se requiere un directorio temporal escribible para el motor de SQLite/tmp de Rust
      - type: tmpfs
        target: /tmp

volumes:
  houston-home:
  houston-docs:
